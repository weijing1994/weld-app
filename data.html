<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工程量日报看板</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: #f4f6f9; padding: 15px; margin:0; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; color: #333; }
    .card { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top:10px; }
    th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
    th { background: #007bff; color: #fff; }
    tr:nth-child(even) { background: #f9f9f9; }
    .back-btn { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; font-weight:bold; }
    .summary { display: flex; justify-content: space-around; text-align:center; }
    .summary-item { padding:10px; }
    .num { font-size:24px; font-weight:bold; color:#007bff; }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 焊口工程量日报看板</h1>

  <div class="card summary">
    <div class="summary-item">
      <div>今日焊口总数</div>
      <div class="num" id="todayCount">0</div>
    </div>
    <div class="summary-item">
      <div>累计焊口总数</div>
      <div class="num" id="totalCount">0</div>
    </div>
    <div class="summary-item">
      <div>涉及焊工数</div>
      <div class="num" id="welderCount">0</div>
    </div>
  </div>

  <div class="card">
    <h2>今日录入明细</h2>
    <table>
      <thead>
        <tr>
          <th>装置代号</th>
          <th>管道编号</th>
          <th>焊口编号</th>
          <th>焊工号</th>
          <th>材质</th>
          <th>日期</th>
        </tr>
      </thead>
      <tbody id="todayList">
        <tr><td colspan="6">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <h2>全部数据汇总</h2>
    <table>
      <thead>
        <tr>
          <th>装置代号</th>
          <th>管道编号</th>
          <th>焊口编号</th>
          <th>焊工号</th>
          <th>材质</th>
          <th>日期</th>
        </tr>
      </thead>
      <tbody id="allList">
        <tr><td colspan="6">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <a href="index.html" class="back-btn">← 返回录入页面</a>
</div>

<script>
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZGx2a2ZubHV5dnRxaW11ZWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTEyNzIsImV4cCI6MjA5NTUyNzI3Mn0.9Ib5-0oK4gaEzLzo_PdSQwElJffBj_Lmqs5J1icm0wk";
  const URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/weld_data";

  const today = new Date().toISOString().split('T')[0];

  window.onload = async () => {
    const res = await fetch(URL + "?select=*", {
      headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
    });
    const data = await res.json();

    const todayData = data.filter(d => d["焊接日期"] === today);
    const allData = data;

    document.getElementById("todayCount").innerText = todayData.length;
    document.getElementById("totalCount").innerText = allData.length;

    const welderSet = new Set(allData.map(d => d["实际焊工号"]).filter(Boolean));
    document.getElementById("welderCount").innerText = welderSet.size;

    fillTable("todayList", todayData);
    fillTable("allList", allData);
  };

  function fillTable(tbodyId, list) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = "";
    if (list.length === 0) {
      tbody.innerHTML = "<tr><td colspan='6'>暂无数据</td></tr>";
      return;
    }
    list.forEach(d => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${d["装置代号"] || ""}</td>
        <td>${d["管道编号"] || ""}</td>
        <td>${d["焊口编号"] || ""}</td>
        <td>${d["实际焊工号"] || ""}</td>
        <td>${d["材质"] || ""}</td>
        <td>${d["焊接日期"] || ""}</td>
      `;
      tbody.appendChild(tr);
    });
  }
</script>
</body>
</html>
