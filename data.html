<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>日报看板</title>
  <style>
    body { background: #f4f6f9; padding: 5px; font-family: sans-serif; }
    .card { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .data-table th, .data-table td { border: 1px solid #aaa; padding: 6px 2px; text-align: center; vertical-align: middle; }
    .data-table th { background: #d1d5db; color: #000; }
    .back-btn { display: block; padding: 10px; background: #4a5568; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body onload="loadAllData()">

  <div class="card">
    <a href="index.html" class="back-btn">← 返回</a>
    <input type="date" id="dateFilter" onchange="render()" style="width:100%; padding:10px; box-sizing:border-box;">
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr><th>序号</th><th>装置</th><th>材质</th><th>当日吋</th><th>当日道</th><th>总吋</th><th>未完成</th><th>进度</th></tr>
      </thead>
      <tbody id="statBody"></tbody>
    </table>
  </div>

<script>
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZGx2a2ZubHV5dnRxaW11ZWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTEyNzIsImV4cCI6MjA5NTUyNzI3Mn0.9Ib5-0oK4gaEzLzo_PdSQwElJffBj_Lmqs5J1icm0wk";
  const URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/weld_data";
  
  let allRecords = [];

  // 1. 一次性把所有记录拉下来，建立一个“全集”
  async function loadAllData() {
    document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
    const res = await fetch(URL + "?select=*", { 
      headers: { "apikey": KEY, "Authorization": "Bearer "+KEY, "Range": "0-9999" } 
    });
    allRecords = await res.json();
    render();
  }

  function render() {
    const d = document.getElementById('dateFilter').value;
    
    // A. 找出所有唯一的装置代号 (不管有没有焊接记录，只要在数据库出现过)
    const devices = [...new Set(allRecords.map(r => r['装置代号']).filter(Boolean))].sort();
    
    let html = "";
    let idx = 1;

    devices.forEach(dev => {
      // B. 找出该装置下所有出现过的材质
      const devRows = allRecords.filter(r => r['装置代号'] === dev);
      const materials = [...new Set(devRows.map(r => r['材质'] || '无'))].sort();
      
      materials.forEach((mat, i) => {
        // C. 计算该装置+该材质的数据
        const records = devRows.filter(r => r['材质'] === mat);
        const dayRecords = records.filter(r => r['焊接日期'] === d);
        
        const totalInch = records.reduce((sum, r) => sum + parseFloat(r['吋径'] || 0), 0);
        const dayInch = dayRecords.reduce((sum, r) => sum + parseFloat(r['吋径'] || 0), 0);
        const dayCount = dayRecords.length;
        const rate = totalInch > 0 ? Math.round((dayInch / totalInch) * 100) + "%" : "0%";

        html += `<tr>
          <td>${idx++}</td>
          ${i === 0 ? `<td rowspan="${materials.length}" style="font-weight:bold; background:#f9f9f9;">${dev}</td>` : ""}
          <td>${mat}</td>
          <td>${dayInch.toFixed(1)}</td>
          <td>${dayCount}</td>
          <td>${totalInch.toFixed(1)}</td>
          <td>${(totalInch - dayInch).toFixed(1)}</td>
          <td>${rate}</td>
        </tr>`;
      });
    });
    document.getElementById('statBody').innerHTML = html;
  }
</script>
</body>
</html>
