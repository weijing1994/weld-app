<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>焊口录入</title>
  <style>
    body { background: #f4f6f9; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .container { max-width: 450px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500; }
    select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 17px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    button:disabled { background: #66b0ff; cursor: not-allowed; }
    .nav-btn { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="form-group">
    <label>装置代号（点击弹出选择）</label>
    <select id="device"><option value="">正在从云端加载装置...</option></select>
  </div>
  <div class="form-group"><label>管道编号</label><input id="pipe" placeholder="请输入管道编号"></div>
  <div class="form-group"><label>焊口编号</label><input id="weldId" placeholder="请输入焊口编号"></div>
  <div class="form-group"><label>焊工号</label><input id="welderId" placeholder="请输入焊工号"></div>
  <div class="form-group"><label>吋径</label><input id="inch" placeholder="请输入吋径" type="number"></div>
  <div class="form-group"><label>材质</label><input id="material" placeholder="请输入材质"></div>
  <div class="form-group"><label>焊接日期</label><input id="date" type="date"></div>
  <button id="submitBtn" onclick="save()">提交数据</button>
  <a href="data.html" class="nav-btn">查看工程量日报看板</a>
</div>

<script>
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZGx2a2ZubHV5dnRxaW11ZWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTEyNzIsImV4cCI6MjA5NTUyNzI3Mn0.9Ib5-0oK4gaEzLzo_PdSQwElJffBj_Lmqs5J1icm0wk";
  const URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/weld_data";

  // 页面加载
  window.onload = () => {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    fetchDevices();
  };

  // 加载装置列表
  async function fetchDevices() {
    try {
      const res = await fetch(URL + "?select=装置代号", {
        headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
      });
      const data = await res.json();
      const uniqueDevices = [...new Set(data.map(item => item["装置代号"]))].filter(Boolean);
      const select = document.getElementById('device');
      select.innerHTML = '<option value="">请选择装置</option>';
      uniqueDevices.forEach(code => {
        const opt = document.createElement('option');
        opt.value = code;
        opt.textContent = code;
        select.appendChild(opt);
      });
    } catch (e) {
      document.getElementById('device').innerHTML = '<option value="">加载失败，请刷新重试</option>';
    }
  }

  // 保存数据
  async function save() {
    // 自动转大写（工地常用）
    const device = document.getElementById('device').value.trim();
    const pipe = document.getElementById('pipe').value.trim().toUpperCase();
    const weldId = document.getElementById('weldId').value.trim().toUpperCase();
    const welderId = document.getElementById('welderId').value.trim().toUpperCase();
    const inch = document.getElementById('inch').value.trim();
    const material = document.getElementById('material').value.trim();
    const date = document.getElementById('date').value;

    // 校验
    if (!device) { alert("请选择装置代号！"); return; }
    if (!weldId) { alert("请输入焊口编号！"); return; }

    const data = {
      "装置代号": device,
      "管道编号": pipe,
      "焊口编号": weldId,
      "实际焊工号": welderId,
      "吋径": inch,
      "材质": material,
      "焊接日期": date
    };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "提交中...";

    try {
      const res = await fetch(URL, {
        method: "POST",
        headers: {
          "apikey": KEY,
          "Authorization": "Bearer " + KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        alert("提交成功！");
        document.getElementById('weldId').value = '';
        document.getElementById('weldId').focus();
      } else {
        alert("提交失败：" + res.status);
      }
    } catch (err) {
      alert("网络异常，请检查连接");
    } finally {
      btn.disabled = false;
      btn.textContent = "提交数据";
    }
  }
</script>
</body>
</html>
