<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>焊口录入系统</title>
  <style>
    body { background: #f4f6f9; padding: 15px; font-family: sans-serif; }
    .container { max-width: 450px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; margin-top: 10px; }
    .nav-btn { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; }
    /* 这里只加了一行极小的样式，确保不影响整体布局 */
    .lock-setting { font-size: 12px; color: #888; margin-bottom: 10px; text-align: right; }
  </style>
</head>
<body>

<div class="container">
  <h3>焊口录入</h3>
  
  <div class="lock-setting">
    <input type="checkbox" id="lockInfo"> <label style="display:inline;" for="lockInfo">锁定信息以连续录入</label>
  </div>

  <div class="form-group"><label>装置代号</label><select id="device"><option value="">正在读取...</option></select></div>
  <div class="form-group"><label>管道编号</label><input id="pipe"></div>
  <div class="form-group"><label>焊口编号</label><input id="weldId"></div>
  <div class="form-group"><label>焊工号</label><input id="welderId"></div>
  <div class="form-group"><label>吋径</label><input id="inch"></div>
  <div class="form-group"><label>材质</label><input id="material"></div>
  <div class="form-group"><label>焊接日期</label><input id="date" type="date"></div>

  <button onclick="save()">提交</button>
  <a href="data.html" class="nav-btn">查看工程量日报看板</a>
</div>

<script>
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZGx2a2ZubHV5dnRxaW11ZWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTEyNzIsImV4cCI6MjA5NTUyNzI3Mn0.9Ib5-0oK4gaEzLzo_PdSQwElJffBj_Lmqs5J1icm0wk";
  const URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/weld_data";

  window.onload = () => {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    loadDeviceCodes();
  };

  async function loadDeviceCodes() {
    const res = await fetch(URL + "?select=装置代号", { headers: { "apikey": KEY, "Authorization": "Bearer "+KEY }});
    const data = await res.json();
    const codes = [...new Set(data.map(i => i["装置代号"]))].filter(Boolean).sort();
    const sel = document.getElementById('device');
    codes.forEach(c => { let o = document.createElement('option'); o.value = c; o.text = c; sel.appendChild(o); });
  }

  async function save() {
    const data = {
      "装置代号": document.getElementById('device').value,
      "管道编号": document.getElementById('pipe').value,
      "焊口编号": document.getElementById('weldId').value,
      "实际焊工号": document.getElementById('welderId').value,
      "吋径": document.getElementById('inch').value,
      "材质": document.getElementById('material').value,
      "焊接日期": document.getElementById('date').value
    };
    
    if(!data["装置代号"] || !data["焊口编号"]) { alert("请填写必要信息！"); return; }
    
    const res = await fetch(URL, {
      method: "POST",
      headers: { "apikey": KEY, "Authorization": "Bearer "+KEY, "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if(res.ok) {
      alert("提交成功：" + data["焊口编号"]);
      // 如果开启了锁定，只清空焊口编号，其余不动
      if (!document.getElementById('lockInfo').checked) {
        document.querySelectorAll('input').forEach(i => { if(i.type !== 'date' && i.id !== 'lockInfo') i.value = ''; });
      } else {
        document.getElementById('weldId').value = '';
        document.getElementById('weldId').focus();
      }
    } else { alert("提交失败"); }
  }
</script>
</body>
</html>
