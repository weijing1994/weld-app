<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>焊口录入</title>
  <style>
    body { background: #f4f6f9; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .container { max-width: 450px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500; }
    select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 17px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    .nav-btn { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="form-group"><label>装置代号</label><select id="device"><option value="">正在读取...</option></select></div>
  <div class="form-group"><label>管道编号</label><select id="pipe"><option value="">请选择管道编号</option></select></div>
  <div class="form-group"><label>焊口编号</label><input id="weldId" placeholder="请输入焊口编号" onblur="checkWeldId()"></div>
  <div class="form-group"><label>焊工号</label><input id="welderId" placeholder="请输入焊工号"></div>
  <div class="form-group"><label>材质</label><input id="material" placeholder="自动填充材质"></div>
  <div class="form-group"><label>焊接日期</label><input id="date" type="date"></div>
  <button id="submitBtn" onclick="save()">提交数据</button>
  <a href="data.html" class="nav-btn">查看工程量日报看板</a>
</div>

<script>
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZGx2a2ZubHV5dnRxaW11ZWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTEyNzIsImV4cCI6MjA5NTUyNzI3Mn0.9Ib5-0oK4gaEzLzo_PdSQwElJffBj_Lmqs5J1icm0wk";
  const URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/weld_data";

  window.onload = () => {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    loadInitialData();
  };

  async function loadInitialData() {
    const res = await fetch(URL + "?select=*", {
      headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
    });
    const data = await res.json();

    const devices = [...new Set(data.map(i => i["装置代号"]))];
    const pipes = [...new Set(data.map(i => i["管道编号"]))];

    fillSelect('device', devices);
    fillSelect('pipe', pipes);
  }

  function fillSelect(id, arr) {
    const sel = document.getElementById(id);
    arr.filter(Boolean).forEach(v => {
      let o = document.createElement('option');
      o.value = v;
      o.text = v;
      sel.appendChild(o);
    });
  }

  async function checkWeldId() {
    const id = document.getElementById('weldId').value;
    if (!id) return;
    const res = await fetch(URL + `?焊口编号=eq.${id}`, {
      headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
    });
    const data = await res.json();
    if (data.length > 0) alert("⚠️ 警告：该焊口编号已存在！");
  }

  async function save() {
    const data = {
      "装置代号": document.getElementById('device').value,
      "管道编号": document.getElementById('pipe').value,
      "焊口编号": document.getElementById('weldId').value.toUpperCase(),
      "实际焊工号": document.getElementById('welderId').value,
      "材质": document.getElementById('material').value,
      "焊接日期": document.getElementById('date').value
    };

    if (!data["焊口编号"]) { alert("请填写焊口编号！"); return; }

    const res = await fetch(URL, {
      method: "POST",
      headers: {
        "apikey": KEY,
        "Authorization": "Bearer " + KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      alert("该焊口属性已记录！");
      document.getElementById('weldId').value = '';
      document.getElementById('weldId').focus();
    } else {
      alert("提交失败");
    }
  }
</script>
</body>
</html>
