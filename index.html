<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>焊口智能化录入系统</title>
  <style>
    /* 你原有的 UI CSS 保持不变 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif; }
    body { background-color: #f8fafc; padding: 20px 16px 40px; }
    .container { max-width: 520px; margin: 0 auto; }
    .title { font-size: 24px; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 28px; }
    .card { background: #ffffff; border-radius: 24px; padding: 20px 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid #e9eef3; }
    .form-group { margin-bottom: 20px; }
    label { display: flex; align-items: center; font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 8px; gap: 6px; }
    .hint { font-size: 11px; padding: 2px 8px; border-radius: 20px; background-color: #f1f5f9; color: #475569; }
    input, select { width: 100%; height: 48px; padding: 0 14px; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 15px; }
    .btn { width: 100%; height: 52px; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; color: white; background: #22c55e; }
    .msg-area { margin-top: 16px; text-align: center; padding: 10px; border-radius: 60px; font-size: 14px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-content { background: #fff; border-radius: 32px; width: 100%; max-width: 420px; padding: 20px; }
    .modal-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 340px; overflow-y: auto; margin-top: 15px; }
    .modal-item { background: #f8fafc; border-radius: 40px; padding: 10px; text-align: center; font-size: 13px; cursor: pointer; border: 1px solid #e2e8f0; }
    .modal-item.submitted { background: #fee2e2; color: #991b1b; text-decoration: line-through; }
  </style>
</head>
<body>
<div class="container">
  <h2 class="title">焊口智能化录入系统</h2>
  <div class="card">
    <div class="form-group"><label>装置代号</label><input id="device" readonly placeholder="点击选择" onclick="openModal('device')"></div>
    <div class="form-group"><label>管道编号</label><input id="pipe" readonly placeholder="请先选装置" onclick="openModal('pipe')"></div>
    <div class="form-group"><label>焊口编号</label><input id="weldId" readonly placeholder="请先选管道" onclick="openModal('weld')"></div>
    <div class="form-group"><label>实际焊工号</label><input id="welderId" placeholder="请输入焊工号"></div>
    <button class="btn" onclick="submitWeldData()">提交焊口数据</button>
    <div id="msg" class="msg-area"></div>
  </div>
</div>

<div id="modal" class="modal"><div class="modal-content"><h4 id="modalTitle">请选择</h4><input id="modalSearch" oninput="renderModalList()" placeholder="搜索..."><div class="modal-list" id="modalList"></div></div></div>

<script>
  const SUPABASE_KEY = "你的KEY";
  const SUPABASE_URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/weld_data";
  
  let allData = [];

  window.onload = async () => {
    await fetchData();
  };

  async function fetchData() {
    try {
      const res = await fetch(SUPABASE_URL + "?select=*", { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } });
      allData = await res.json();
      console.log("数据加载成功，共 " + allData.length + " 条");
    } catch (e) { console.error("连接错误", e); }
  }

  let currentType = "";
  function openModal(type) {
    currentType = type;
    document.getElementById('modal').style.display = 'flex';
    renderModalList();
  }

  function renderModalList() {
    const listEl = document.getElementById('modalList');
    const keyword = document.getElementById('modalSearch').value.toLowerCase();
    let items = [];
    
    if (currentType === 'device') items = [...new Set(allData.map(i => i["装置代号"]))].filter(Boolean);
    else if (currentType === 'pipe') items = [...new Set(allData.filter(i => i["装置代号"] === document.getElementById('device').value).map(i => i["管道编号"]))].filter(Boolean);
    else if (currentType === 'weld') items = allData.filter(i => i["管道编号"] === document.getElementById('pipe').value);
    
    listEl.innerHTML = items.filter(i => (i["焊口编号"] || i).toString().toLowerCase().includes(keyword)).map(i => {
      const val = i["焊口编号"] || i;
      const isSub = i["管工"] ? true : false;
      return `<div class="modal-item ${isSub ? 'submitted' : ''}" onclick="selectItem('${val}')">${val}${isSub ? ' [已录]' : ''}</div>`;
    }).join('');
  }

  function selectItem(val) {
    if (currentType === 'device') document.getElementById('device').value = val;
    else if (currentType === 'pipe') document.getElementById('pipe').value = val;
    else document.getElementById('weldId').value = val;
    document.getElementById('modal').style.display = 'none';
  }

  async function submitWeldData() {
    const payload = {
        "装置代号": document.getElementById('device').value,
        "管道编号": document.getElementById('pipe').value,
        "焊口编号": document.getElementById('weldId').value,
        "实际焊工号": document.getElementById('welderId').value,
        "管工": "jingwei"
    };
    const res = await fetch(SUPABASE_URL, { 
        method: "POST", 
        headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
    if(res.ok) { alert("提交成功"); await fetchData(); }
    else { alert("提交失败，请检查控制台"); }
  }
</script>
</body>
</html>
