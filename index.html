<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>焊口智能化录入系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f0f2f5; padding: 20px; }
    .container { max-width: 540px; margin: 0 auto; }
    .card { background: white; border-radius: 28px; padding: 24px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    .title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 24px; color: #1f2937; }
    .form-group { margin-bottom: 20px; }
    label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #374151; }
    .hint { font-size: 11px; background: #eef2ff; padding: 2px 8px; border-radius: 30px; color: #2563eb; font-weight: normal; }
    input, select { width: 100%; height: 48px; padding: 0 16px; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 15px; background: white; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; }
    input[readonly] { background-color: #f8fafc; cursor: pointer; }
    .auto-field { background-color: #f1f5f9; font-weight: 500; }
    .btn { width: 100%; height: 50px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 16px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 12px; }
    .btn-secondary { background: #e2e8f0; color: #1f2937; margin-top: 10px; }
    .msg-area { margin-top: 16px; padding: 10px; border-radius: 40px; font-size: 13px; text-align: center; }
    .success { background: #dcfce7; color: #15803d; }
    .error { background: #fee2e2; color: #b91c1c; }
    .warning { background: #fef9c3; color: #854d0e; }
    .footer { margin-top: 20px; font-size: 12px; color: #6b7280; text-align: center; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 32px; padding: 20px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .modal-search { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 30px; margin-bottom: 16px; }
    .modal-list { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
    .modal-item { background: #f1f5f9; padding: 10px; text-align: center; border-radius: 40px; cursor: pointer; }
    .modal-item.submitted { background: #fee2e2; color: #991b1b; text-decoration: line-through; cursor: not-allowed; }
    .close-btn { background: #e2e8f0; border: none; padding: 5px 12px; border-radius: 30px; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="title">焊口智能化录入系统</div>
    <div class="form-group"><label>装置代号 <span class="hint">1.点击选择</span></label><input id="device" readonly placeholder="点击选择装置代号" onclick="openModal('device')"></div>
    <div class="form-group"><label>管道编号 <span class="hint">2.点击选择</span></label><input id="pipe" readonly placeholder="请先选择装置" onclick="openModal('pipe')" disabled></div>
    <div class="form-group"><label>焊口编号 <span class="hint">3.点击选单</span></label>
      <div style="display:flex; gap:8px;"><input id="weldId" readonly placeholder="点击右侧按钮选择" onclick="openWeldSelect()" style="flex:1;"><button type="button" class="btn" id="openWeldBtn" style="width:60px; margin:0;" onclick="openWeldSelect()">选单</button></div>
    </div>
    <div class="form-group"><label>吋径</label><input id="inch" readonly class="auto-field"></div>
    <div class="form-group"><label>壁厚等级</label><input id="wall" readonly class="auto-field"></div>
    <div class="form-group"><label>规格mm</label><input id="spec" readonly class="auto-field"></div>
    <div class="form-group"><label>材质</label><input id="material" readonly class="auto-field"></div>
    <div class="form-group"><label>公称直径DN</label><input id="dn" readonly class="auto-field"></div>
    <div class="form-group"><label>实际焊工号 <span class="hint">15分钟自动清空</span></label><input id="welderId"></div>
    <div class="form-group"><label>焊缝类型</label><select id="weldType"><option value="">--请选择--</option><option value="BW">BW(对接)</option><option value="SW">SW(承插)</option><option value="D">D(管台)</option></select></div>
    <div class="form-group"><label>焊接方法</label><select id="method"><option value="">--请选择--</option><option value="GTAW">GTAW(氩弧)</option><option value="SMAW">SMAW(手工)</option><option value="GTAW+SMAW">组合</option></select></div>
    <div class="form-group"><label>焊接日期</label><input id="date" type="date"></div>
    <div class="form-group"><label>管工</label><input id="worker" readonly value="jingwei"></div>
    <button class="btn" onclick="submitData()">提交焊口数据</button>
    <div id="msg" class="msg-area"></div>
    <button class="btn btn-secondary" onclick="window.location.href='data.html'">进入数据大表看板</button>
  </div>
  <div class="footer">作者：景伟 | 数据从Supabase动态读取</div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h4 id="modalTitle">请选择</h4><button class="close-btn" onclick="closeModal()">关闭</button></div>
    <input type="text" class="modal-search" id="modalSearch" placeholder="筛选..." oninput="renderModalList()">
    <div id="modalList" class="modal-list"></div>
  </div>
</div>

<script>
  const TABLE_NAME = 'weld_data';
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZGx2a2ZubHV5dnRxaW11ZWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTEyNzIsImV4cCI6MjA5NTUyNzI3Mn0.9Ib5-0oK4gaEzLzo_PdSQwElJffBj_Lmqs5J1icm0wk";
  const SUPABASE_URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/";
  
  let allRecords = [];

  window.onload = async () => {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    await loadData();
  };

  async function loadData() {
    try {
      const res = await fetch(`${SUPABASE_URL}${TABLE_NAME}?select=*`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      allRecords = await res.json();
    } catch (err) { console.error(err); }
  }

  let currentModalType = '';
  function openModal(type) {
    currentModalType = type;
    document.getElementById('modal').style.display = 'flex';
    renderModalList();
  }

  function renderModalList() {
    const keyword = document.getElementById('modalSearch').value.toLowerCase();
    const list = document.getElementById('modalList');
    list.innerHTML = '';
    
    let items = [];
    if(currentModalType === 'device') items = [...new Set(allRecords.map(i => i['装置代号']))];
    else if(currentModalType === 'pipe') items = [...new Set(allRecords.filter(i => i['装置代号'] === document.getElementById('device').value).map(i => i['管道编号']))];
    else if(currentModalType === 'weld') items = allRecords.filter(i => i['管道编号'] === document.getElementById('pipe').value);

    items.forEach(item => {
      const val = typeof item === 'object' ? item['焊口编号'] : item;
      const isSubmitted = item['管工'] ? true : false;
      const div = document.createElement('div');
      div.className = 'modal-item' + (isSubmitted ? ' submitted' : '');
      div.innerText = val + (isSubmitted ? ' [已录]' : '');
      div.onclick = () => { if(!isSubmitted) selectItem(item); };
      list.appendChild(div);
    });
  }

  function selectItem(item) {
    if(currentModalType === 'device') { document.getElementById('device').value = item; document.getElementById('pipe').disabled = false; }
    else if(currentModalType === 'pipe') document.getElementById('pipe').value = item;
    else {
      document.getElementById('weldId').value = item['焊口编号'];
      document.getElementById('inch').value = item['吋径'] || '';
      document.getElementById('wall').value = item['壁厚等级'] || '';
      document.getElementById('spec').value = item['规格mm'] || '';
      document.getElementById('material').value = item['材质'] || '';
      document.getElementById('dn').value = item['公称直径DN'] || '';
    }
    closeModal();
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  function openWeldSelect() { if(document.getElementById('pipe').value) openModal('weld'); else alert('请先选择管道'); }

  async function submitData() {
    const payload = {
        "装置代号": document.getElementById('device').value,
        "管道编号": document.getElementById('pipe').value,
        "焊口编号": document.getElementById('weldId').value,
        "实际焊工号": document.getElementById('welderId').value,
        "焊缝类型(必填）": document.getElementById('weldType').value,
        "焊接方法": document.getElementById('method').value,
        "焊接日期": document.getElementById('date').value,
        "管工": document.getElementById('worker').value
    };
    const res = await fetch(`${SUPABASE_URL}${TABLE_NAME}`, {
        method: "POST",
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
    if(res.ok) { alert("提交成功"); loadData(); } else alert("提交失败");
  }
</script>
</body>
</html>
