<!DOCTYPE html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>焊口智能化录入系统</title>
  
  <script>
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZGx2a2ZubHV5dnRxaW11ZWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTEyNzIsImV4cCI6MjA5NTUyNzI3Mn0.9Ib5-0oK4gaEzLzo_PdSQwElJffBj_Lmqs5J1icm0wk";
    const BASE_URL = "https://abdlvkfnluyvtqimueiq.supabase.co/rest/v1/";

    let validDevices = [];
    let validPipes = [];
    let validWelds = [];
    let currentModalType = "";

    function initSystem() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').value = today;

      let currentLoggedInUser = "jingwei"; 
      try {
        const sessionUser = localStorage.getItem('supabase.auth.username') || localStorage.getItem('current_user_pinyin');
        if (sessionUser) currentLoggedInUser = sessionUser;
      } catch(e) {}
      document.getElementById('worker').value = currentLoggedInUser;

      loadAllDevices();
    }

    async function loadAllDevices() {
      const devBtn = document.getElementById('deviceTrigger');
      try {
        const res = await fetch(BASE_URL + "v_unique_devices?select=*", {
          headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
        });
        const rawData = await res.json();
        validDevices = rawData.map(item => item["装置代号"]).filter(Boolean);
        devBtn.innerText = "-- 点击弹出格子选择装置 --";
      } catch (err) {
        devBtn.innerText = "装置代号加载失败，请刷新页面";
      }
    }

    async function openModal(type) {
      currentModalType = type;
      document.getElementById('modalSearch').value = ''; 
      const container = document.getElementById('modalGridContainer');
      container.innerHTML = '';
      
      const titleHint = document.getElementById('modalTitleHint');
      const searchInput = document.getElementById('modalSearch');

        titleHint.innerText = "请选择装置代号 :";
        searchInput.placeholder = "🔍 输入装置代号关键字快捷筛选...";
        
        validDevices.forEach(dev => {
          let cell = document.createElement('div');
          cell.className = 'data-cell';
          cell.innerText = dev;
          cell.setAttribute('data-search', dev.toLowerCase());
          cell.onclick = () => selectDevice(dev);
          container.appendChild(cell);
        });
      }

        titleHint.innerText = "请选择管道编号 :";
        searchInput.placeholder = "🔍 输入管道编号关键字快捷筛选...";

          let cell = document.createElement('div');
          cell.className = 'data-cell';
          cell.innerText = pipe;
          cell.setAttribute('data-search', pipe.toLowerCase());
          cell.onclick = () => selectPipe(pipe);
          container.appendChild(cell);
        });
      }

        document.getElementById('weldTrigger').innerText = "正在智能拉取查重...";

            headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
          });

            headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
